name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Smoke suite
        run: node test/smoke.mjs
      - name: Syntax check
        shell: bash
        run: |
          while IFS= read -r file; do node --check "$file"; done < <(git ls-files '*.mjs')
